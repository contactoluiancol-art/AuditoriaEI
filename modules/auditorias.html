<div class="module-container">

    <!-- =========================
         HEADER
    ========================== -->

    <div class="module-header">

        <div>

            <h2>📋 Auditorías</h2>

            <p>
                Historial documental de auditorías realizadas.
            </p>

        </div>

    </div>

    <!-- =========================
         FORMULARIO
    ========================== -->

    <div class="module-card">

        <div class="table-header">

            <h3>Registrar Auditoría</h3>

        </div>

        <div class="form-grid">

            <!-- Tipo -->

            <div class="input-group">

                <label>Tipo de Auditoría</label>

                <select id="tipoInput">

                    <option value="">Seleccione</option>

                    <option value="Inventario">Inventario</option>

                    <option value="Recepciones">Recepciones</option>

                    <option value="Compras">Compras</option>

                    <option value="Despachos">Despachos</option>

                    <option value="Ventas">Ventas</option>

                </select>

            </div>

            <!-- Nombre -->

            <div class="input-group">

                <label>Nombre de la Auditoría</label>

                <input
                    type="text"
                    id="nombreInput"
                    placeholder="Ej: Inventario General Julio 2026"
                >

            </div>

            <!-- Responsable -->

            <div class="input-group">

                <label>Responsable</label>

                <input
                    type="text"
                    id="responsableInput"
                    placeholder="Ingrese responsable"
                >

            </div>

            <!-- Proceso -->

            <div class="input-group">

                <label>Proceso / Referencia</label>

                <input
                    type="text"
                    id="procesoInput"
                    placeholder="Ej: Bodega Principal, OC-1254..."
                >

            </div>

            <!-- Estado -->

            <div class="input-group">

                <label>Estado</label>

                <select id="estadoInput">

                    <option value="Pendiente">Pendiente</option>

                    <option value="En proceso">En proceso</option>

                    <option value="Finalizada">Finalizada</option>

                </select>

            </div>

            <!-- Fecha -->

            <div class="input-group">

                <label>Fecha Auditoría</label>

                <input
                    type="date"
                    id="fechaInput"
                >

            </div>

        </div>

        <!-- Observaciones -->

        <div class="input-group textarea-group">

            <label>Observaciones</label>

            <textarea

                id="observacionesInput"

                rows="4"

                placeholder="Observaciones generales de la auditoría"

            ></textarea>

        </div>

    </div>

    <!-- =========================
         DOCUMENTOS
    ========================== -->

    <div class="module-card">

        <div class="table-header">

            <h3>Documentos de la Auditoría</h3>

        </div>

        <div class="documentos-container">

            <!-- Lista dinámica -->

            <div id="listaDocumentos">

                <div class="documento-vacio">

                    📄 Ningún documento agregado.

                </div>

            </div>

            <div class="button-group">

                <input

                    type="file"

                    id="documentoInput"

                    accept=".xlsx,.xls,.pdf"

                    multiple

                    hidden

                >

                <button

                    id="btnAgregarDocumento"

                    type="button"

                    class="btn-secondary"

                >

                    + Agregar Documento

                </button>

            </div>

        </div>

    </div>

    <!-- =========================
         BOTÓN GUARDAR
    ========================== -->

    <div class="button-group">

        <button

            id="guardarAuditoria"

            class="btn-primary"

        >

            Guardar Auditoría

        </button>

    </div>

    <!-- =========================
         HISTORIAL
    ========================== -->

    <div class="module-card">

        <div class="table-header">

            <h3>Historial de Auditorías</h3>

        </div>

        <div class="table-container">

            <table class="table-pro">

                <thead>

                    <tr>

                        <th style="width:10%;">
                            Tipo
                        </th>

                        <th style="width:22%;">
                            Nombre
                        </th>

                        <th style="width:18%;">
                            Proceso / Referencia
                        </th>

                        <th style="width:12%;">
                            Responsable
                        </th>

                        <th style="width:10%;">
                            Estado
                        </th>

                        <th style="width:12%;">
                            Fecha
                        </th>

                        <th style="width:8%;">
                            Docs
                        </th>

                        <th style="width:8%;">
                            Acciones
                        </th>

                    </tr>

                </thead>

                <tbody id="auditoriasBody">

                </tbody>

            </table>

        </div>

    </div>

</div>

<!-- =========================
     MODAL DOCUMENTOS
========================= -->

<div id="modalDocumentos" class="modal-documentos">

    <div class="modal-documentos-content">

        <div class="modal-header">

            <h3>Documentos de la Auditoría</h3>

            <button
                id="cerrarModalDocumentos"
                class="btn-eliminar"
                type="button"
            >
                ✕
            </button>

        </div>

        <div id="listaDocumentosModal">

        </div>

    </div>

</div>
